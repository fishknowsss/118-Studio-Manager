name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - singleD
      - vc
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.vars.outputs.deploy_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve deploy target
        id: vars
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main)
              deploy_target="v1"
              deploy_base="/118-Studio-Manager/${deploy_target}/"
              ;;
            singleD)
              deploy_target="singleD"
              deploy_base="/118-Studio-Manager/${deploy_target}/"
              ;;
            vc)
              deploy_target="vc"
              deploy_base="/"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          echo "deploy_target=${deploy_target}" >> "${GITHUB_OUTPUT}"
          echo "deploy_base=${deploy_base}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DEPLOY_BASE: ${{ steps.vars.outputs.deploy_base }}
        run: npm run build

      - name: Assemble versioned site
        env:
          DEPLOY_TARGET: ${{ steps.vars.outputs.deploy_target }}
          REPOSITORY_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/site"
          deploy_repo="${RUNNER_TEMP}/gh-pages"
          mkdir -p "${site_dir}"

          git init "${deploy_repo}"
          cd "${deploy_repo}"
          git remote add origin "${REPOSITORY_URL}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec cp -R {} "${site_dir}/" \;
          touch "${site_dir}/.nojekyll"

          if [ "${DEPLOY_TARGET}" = "vc" ]; then
            find "${site_dir}" -mindepth 1 -maxdepth 1 \
              ! -name 'v1' \
              ! -name 'singleD' \
              ! -name '.nojekyll' \
              ! -name 'CNAME' \
              -exec rm -rf {} +
            cp -R "${GITHUB_WORKSPACE}/dist/." "${site_dir}/"
          else
            rm -rf "${site_dir}/${DEPLOY_TARGET}"
            mkdir -p "${site_dir}/${DEPLOY_TARGET}"
            cp -R "${GITHUB_WORKSPACE}/dist/." "${site_dir}/${DEPLOY_TARGET}/"
          fi

      - name: Sync gh-pages branch
        env:
          REPOSITORY_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/site"
          deploy_repo="${RUNNER_TEMP}/gh-pages-push"
          git init "${deploy_repo}"
          cd "${deploy_repo}"
          git remote add origin "${REPOSITORY_URL}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${site_dir}/." .
          git config user.name "Fishknowsss"
          git config user.email "imnothapi@gmail.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          git push origin gh-pages

      - name: Upload artifact
        uses: ./.github/actions/upload-pages-artifact
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
