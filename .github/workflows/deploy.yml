name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - singleD
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.vars.outputs.deploy_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy target
        id: vars
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main)
              deploy_target="v1"
              ;;
            singleD)
              deploy_target="singleD"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac
          echo "deploy_target=${deploy_target}" >> "${GITHUB_OUTPUT}"
          echo "deploy_base=/118-Studio-Manager/${deploy_target}/" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          DEPLOY_BASE: ${{ steps.vars.outputs.deploy_base }}
        run: npm run build

      - name: Assemble versioned site
        env:
          DEPLOY_TARGET: ${{ steps.vars.outputs.deploy_target }}
          REPOSITORY_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/site"
          deploy_repo="${RUNNER_TEMP}/gh-pages"
          mkdir -p "${site_dir}"

          git init "${deploy_repo}"
          cd "${deploy_repo}"
          git remote add origin "${REPOSITORY_URL}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          cp -R . "${site_dir}"
          find "${site_dir}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p "${site_dir}/${DEPLOY_TARGET}"
          cp -R "${GITHUB_WORKSPACE}/dist/." "${site_dir}/${DEPLOY_TARGET}/"
          touch "${site_dir}/.nojekyll"
          cat > "${site_dir}/index.html" <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/118-Studio-Manager/v1/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>118 Studio Manager</title>
            </head>
            <body>
              <p>Redirecting to <a href="/118-Studio-Manager/v1/">/118-Studio-Manager/v1/</a>...</p>
            </body>
          </html>
          EOF

      - name: Sync gh-pages branch
        env:
          REPOSITORY_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/site"
          deploy_repo="${RUNNER_TEMP}/gh-pages-push"
          git init "${deploy_repo}"
          cd "${deploy_repo}"
          git remote add origin "${REPOSITORY_URL}"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${site_dir}/." .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy ${GITHUB_REF_NAME} (${GITHUB_SHA})"
          git push origin gh-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
